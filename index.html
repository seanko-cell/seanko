<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sean's HTML Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
    }
    header {
      background: #FF6B2C;
      color: white;
      padding: 28px 40px;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; margin-top: 4px; opacity: 0.85; }

    .container { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #FF6B2C;
      border-radius: 12px;
      background: white;
      padding: 36px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 32px;
      position: relative;
    }
    .drop-zone.dragover {
      background: #fff2ec;
      border-color: #e85a1a;
      color: #FF6B2C;
    }
    .drop-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-zone strong { display: block; color: #FF6B2C; font-size: 15px; margin-bottom: 4px; }

    /* File list */
    .file-list { display: flex; flex-direction: column; gap: 12px; }
    .file-card {
      background: white;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: box-shadow 0.2s;
    }
    .file-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    .file-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .file-icon {
      width: 40px; height: 40px;
      background: #fff2ec;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .file-info { min-width: 0; }
    .file-name {
      font-weight: 600;
      font-size: 15px;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
    .file-actions { display: flex; gap: 8px; flex-shrink: 0; margin-left: 16px; }
    .btn-open {
      padding: 7px 18px;
      background: #FF6B2C;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-open:hover { background: #e85a1a; }
    .btn-del {
      padding: 7px 10px;
      background: #f4f4f4;
      color: #aaa;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-del:hover { background: #fde8e8; color: #e74c3c; }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 20px 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>📁 Sean's HTML Hub</h1>
  <p>HTML 파일을 드래그하거나 클릭해서 등록하세요</p>
</header>

<div class="container">

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".html" multiple/>
    <div class="drop-icon">🗂️</div>
    <strong>HTML 파일을 여기에 드래그하거나 클릭해서 추가</strong>
    <span>등록된 파일은 아래 목록에 저장됩니다</span>
  </div>

  <div class="section-title">등록된 파일</div>
  <div class="file-list" id="fileList"></div>

</div>

<script>
  const STORAGE_KEY = 'sean_html_hub';

  function load() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function save(files) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
  }

  function render() {
    const files = load();
    const list = document.getElementById('fileList');
    if (files.length === 0) {
      list.innerHTML = '<p class="empty">아직 등록된 파일이 없습니다</p>';
      return;
    }
    list.innerHTML = files.map((f, i) => `
      <div class="file-card">
        <div class="file-left">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${f.label || f.name}</div>
            <div class="file-meta">${f.name} · ${f.added}</div>
          </div>
        </div>
        <div class="file-actions">
          <a class="btn-open" href="${f.name}" target="_blank">열기</a>
          <button class="btn-del" onclick="remove(${i})" title="목록에서 제거">✕</button>
        </div>
      </div>
    `).join('');
  }

  function addFiles(fileObjs) {
    const files = load();
    let added = 0;
    Array.from(fileObjs).forEach(file => {
      if (!file.name.endsWith('.html')) return;
      if (files.find(f => f.name === file.name)) return; // 중복 방지
      files.push({
        name: file.name,
        label: file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' '),
        added: new Date().toLocaleDateString('ko-KR')
      });
      added++;
    });
    if (added > 0) { save(files); render(); }
  }

  function remove(index) {
    const files = load();
    files.splice(index, 1);
    save(files);
    render();
  }

  // File input
  document.getElementById('fileInput').addEventListener('change', e => {
    addFiles(e.target.files);
    e.target.value = '';
  });

  // Drag & drop
  const zone = document.getElementById('dropZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });

  // 현재 파일(index.html)과 같은 폴더에 있는 파일 자동 제안은 불가(보안 제한)
  // 대신 이미 알려진 파일이 있으면 자동 등록
  (function autoRegister() {
    const known = ['bunjang-partner-guide.html'];
    const files = load();
    let changed = false;
    known.forEach(name => {
      if (!files.find(f => f.name === name)) {
        files.push({
          name,
          label: name.replace('.html','').replace(/-/g,' ').replace(/_/g,' '),
          added: new Date().toLocaleDateString('ko-KR')
        });
        changed = true;
      }
    });
    if (changed) save(files);
  })();

  render();
</script>

</body>
</html>
